name = "Filedrop"
client_id = "7d13d3b0c1082a17bcfb8063a4e323af"
application_url = "https://filedrop-production-6d21.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_customers"

[auth]
redirect_urls = [
  "https://filedrop-production-6d21.up.railway.app/api/v1/auth/callback"
]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/v1/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/api/v1/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "/api/v1/webhooks/orders/updated"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/api/v1/webhooks/products/update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/api/v1/gdpr/webhooks"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "practice01-knvjgcjw.myshopify.com"
