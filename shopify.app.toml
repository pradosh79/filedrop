name = "Custom File Upload Pro"
client_id = "{{ SHOPIFY_API_KEY }}"
application_url = "{{ APP_URL }}"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_customers,write_script_tags,read_themes,write_themes"

[auth]
redirect_urls = [
  "{{ APP_URL }}/auth/callback",
  "{{ APP_URL }}/auth/install"
]

[webhooks]
api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "{{ APP_URL }}/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "{{ APP_URL }}/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "{{ APP_URL }}/webhooks/orders/updated"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "{{ APP_URL }}/webhooks/products/update"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = "{{ DEV_STORE_URL }}"

[app_info]
  [app_info.privacy_compliance]
  privacy_policy_url = "{{ APP_URL }}/privacy"
  refund_policy_url = "{{ APP_URL }}/refund"
  tos_url = "{{ APP_URL }}/terms"
