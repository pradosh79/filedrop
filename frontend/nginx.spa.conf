server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Shopify embedded apps MUST be loadable in an iframe.
    # DO NOT set X-Frame-Options - it blocks the Shopify admin from loading the app.
    # Instead use Content-Security-Policy frame-ancestors to restrict to Shopify only.
    add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Cache static assets aggressively (Vite adds content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com;" always;
    }

    # SPA fallback - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com;" always;
    }

    # Health check
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
